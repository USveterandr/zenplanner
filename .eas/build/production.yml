build:
  name: Build Android TWA (Release AAB)
  steps:
    - eas/checkout
    - run:
        name: Set up JDK 17
        command: |
          sudo apt-get install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $EAS_BUILD_ENVS_FILE
    - run:
        name: Make gradlew executable
        working_directory: android-twa
        command: chmod +x gradlew
    - run:
        name: Build release AAB
        working_directory: android-twa
        command: ./gradlew :app:bundleRelease
    - eas/upload_artifact:
        name: Upload AAB
        inputs:
          type: application-archive
          path: android-twa/app/build/outputs/bundle/release/app-release.aab
